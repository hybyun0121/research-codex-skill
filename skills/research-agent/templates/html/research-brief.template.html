<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #64748b;
      --line: #d7e0ea;
      --paper: #ffffff;
      --band: #f5f8fc;
      --accent: #2563eb;
      --navy: #004f8b;
      --navy-dark: #00205b;
      --panel: #ffffff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      color: var(--ink);
      background: #eef3f8;
      font-family: Inter, "Gothic A1", Arial, sans-serif;
      line-height: 1.55;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 18px;
      padding: 12px max(24px, calc((100vw - 1120px) / 2));
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .topbar a {
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }
    header, section {
      padding: 38px max(24px, calc((100vw - 1120px) / 2));
    }
    .hero {
      color: #fff;
      background:
        linear-gradient(135deg, rgba(0, 32, 91, 0.96), rgba(0, 79, 139, 0.9)),
        radial-gradient(circle at 82% 18%, rgba(74, 148, 208, 0.45), transparent 28%);
      border-bottom: 0;
      padding-top: 58px;
      padding-bottom: 48px;
    }
    section {
      margin: 0;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
    }
    h1, h2, h3 {
      margin: 0 0 12px;
      line-height: 1.2;
    }
    h1 {
      max-width: 980px;
      font-size: 42px;
      letter-spacing: 0;
    }
    h2 {
      font-size: 28px;
    }
    h3 {
      margin-top: 22px;
      font-size: 16px;
    }
    p {
      margin: 0 0 12px;
    }
    .lede {
      max-width: 850px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 18px;
    }
    .eyebrow {
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .hero .eyebrow {
      color: #9ed0ff;
    }
    .section-head {
      max-width: 780px;
      margin-bottom: 20px;
    }
    .section-head p:not(.eyebrow) {
      color: var(--muted);
      font-size: 16px;
    }
    .hero-grid,
    .card-grid,
    .method-grid,
    .split-grid {
      display: grid;
      gap: 16px;
    }
    .hero-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 28px;
    }
    .card-grid,
    .method-grid,
    .split-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .claim-panel,
    .info-card,
    .method-grid article {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
    }
    .claim-panel {
      padding: 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.96);
    }
    .claim-panel span,
    .card-index {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .claim-panel p,
    .info-card p {
      margin: 0;
      color: var(--ink);
    }
    .info-card {
      padding: 16px;
      min-height: 132px;
    }
    .method-grid article {
      padding: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0 26px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      font-size: 13px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 11px;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #fff;
      background: var(--navy);
    }
    a {
      color: var(--accent);
    }
    pre {
      overflow: auto;
      padding: 14px;
      background: #111827;
      color: #f9fafb;
      border-radius: 8px;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .muted {
      color: var(--muted);
    }
    .callout {
      margin: 16px 0;
      padding: 12px 16px;
      background: var(--band);
      border-left: 4px solid var(--accent);
    }
    .slide-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0 18px;
    }
    .button-link {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid var(--navy);
      border-radius: 6px;
      color: var(--navy);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }
    .slide-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 18px;
      margin-top: 16px;
    }
    .slide-card {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
    }
    .slide-card img {
      display: block;
      width: 100%;
      height: auto;
      background: var(--band);
    }
    .slide-html-thumb {
      aspect-ratio: 16 / 9;
      width: 100%;
      display: grid;
      place-items: center;
      background: var(--band);
      color: var(--accent);
      border-bottom: 1px solid var(--line);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0;
    }
    .slide-card figcaption {
      padding: 8px 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .slide-pdf {
      width: 100%;
      min-height: 640px;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    @media (max-width: 640px) {
      header, section {
        padding: 24px 16px;
      }
      h1 {
        font-size: 30px;
      }
      .topbar {
        overflow-x: auto;
        padding: 10px 16px;
      }
      .hero-grid {
        grid-template-columns: 1fr;
      }
      .slide-grid {
        grid-template-columns: 1fr;
      }
      .slide-pdf {
        min-height: 460px;
      }
    }
  </style>
</head>
<body>
$body
</body>
</html>
